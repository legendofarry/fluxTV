<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U IPTV Channel Tester</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        .channel-card {
            transition: .25s
        }

        .channel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .12)
        }

        .category-btn.active {
            background: #2563eb;
            color: #fff
        }

        .test-btn.active {
            background: #16a34a;
            color: #fff
        }
    </style>
</head>

<body class="bg-gray-100">

    <header class="bg-blue-700 text-white p-5">
        <h1 class="text-3xl font-bold">M3U IPTV Channel Tester</h1>
        <p class="text-blue-200">Buffered Testing • Manual Control • Accurate Results</p>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-6">

        <!-- LOAD -->
        <div class="bg-white p-5 rounded shadow grid md:grid-cols-2 gap-4">
            <input type="file" id="fileInput" accept=".m3u,.m3u8">
            <div class="flex gap-2">
                <input id="urlInput" class="flex-1 border rounded p-2" placeholder="M3U URL">
                <button id="loadUrl" class="bg-blue-600 text-white px-4 rounded">Load</button>
            </div>
        </div>

        <!-- TEST CONTROLS -->
        <div class="bg-white p-5 rounded shadow flex flex-wrap gap-3 items-center">
            <button id="startTest" class="bg-green-600 text-white px-4 py-2 rounded">
                ▶ Test All Channels
            </button>
            <button id="stopTest" class="bg-red-600 text-white px-4 py-2 rounded hidden">
                ■ Stop Test
            </button>

            <div class="ml-auto flex gap-2">
                <button class="test-btn border px-3 py-1 rounded active" data-view="all">All</button>
                <button class="test-btn border px-3 py-1 rounded" data-view="working">Working</button>
                <button class="test-btn border px-3 py-1 rounded" data-view="broken">Broken</button>
            </div>
        </div>

        <!-- COPIED -->
        <div class="bg-white p-5 rounded shadow">
            <div class="flex justify-between mb-2">
                <h2 class="font-bold">Copied Links</h2>
                <button onclick="copyAll()" class="bg-green-600 text-white px-3 py-1 rounded">Copy All</button>
            </div>
            <ul id="copiedList" class="text-sm space-y-1"></ul>
        </div>

        <!-- CONTROLS -->
        <div id="controls" class="hidden bg-white p-5 rounded shadow">
            <div id="categoryBar" class="flex flex-wrap gap-2 mb-4"></div>
            <input id="search" class="w-full border rounded p-2" placeholder="Search channel">
        </div>

        <!-- CHANNELS -->
        <div id="channels" class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>

    </main>

    <!-- FLOATING PLAYER -->
    <div id="playerBox" class="fixed bottom-4 right-4 w-[360px] bg-black rounded shadow-lg hidden z-50">
        <video id="player" controls class="w-full h-48"></video>
        <div class="flex justify-between items-center bg-gray-800 text-white text-xs px-3 py-2">
            <span id="playerStatus">Idle</span>
            <button onclick="closePlayer()" class="text-red-400">✖</button>
        </div>
    </div>

    <script>
        const TEST_TIMEOUT = 12000;

        const startBtn = document.getElementById('startTest');
        const stopBtn = document.getElementById('stopTest');

        let allChannels = [], filtered = [], activeCats = new Set();
        let copied = new Map(), blocked = new Set();
        let testing = false, testIndex = 0, testView = 'all';
        let hls = null, testTimer = null;

        const video = document.getElementById('player');
        const statusEl = document.getElementById('playerStatus');

        function parseM3U(t) {
            const l = t.split('\n').map(x => x.trim());
            let o = [], c = null;
            for (let x of l) {
                if (x.startsWith('#EXTINF')) {
                    c = { name: x.split(',').pop(), status: 'untested' };
                    let g = x.match(/group-title="([^"]+)"/i), logo = x.match(/tvg-logo="([^"]+)"/i);
                    if (g) c.category = g[1]; if (logo) c.logo = logo[1];
                } else if (x && !x.startsWith('#') && c) {
                    c.url = x; o.push(c); c = null;
                }
            }
            return o;
        }

        function process(t) {
            allChannels = parseM3U(t);
            buildCategories();
            apply();
            controls.classList.remove('hidden');
        }

        function buildCategories() {
            categoryBar.innerHTML = '';
            ['All', ...new Set(allChannels.map(c => c.category || 'General'))].forEach(cat => {
                const b = document.createElement('button');
                b.textContent = cat;
                b.className = 'category-btn border px-3 py-1 rounded';
                if (cat === 'All') b.classList.add('active');
                b.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(x => x.classList.remove('active'));
                    activeCats.clear();
                    if (cat !== 'All') activeCats.add(cat);
                    b.classList.add('active');
                    apply();
                };
                categoryBar.appendChild(b);
            });
        }

        function apply() {
            const q = search.value.toLowerCase();
            filtered = allChannels.filter(c =>
                !blocked.has(c.url) &&
                (!activeCats.size || activeCats.has(c.category || 'General')) &&
                c.name.toLowerCase().includes(q) &&
                (testView === 'all' || c.status === testView)
            );
            render();
        }

        function render() {
            channels.innerHTML = '';
            filtered.forEach(c => {
                const d = document.createElement('div');
                d.className = 'channel-card bg-white rounded shadow cursor-pointer';
                d.innerHTML = `
    <img src="${c.logo || 'https://via.placeholder.com/150'}" class="h-32 w-full object-contain bg-gray-100">
    <div class="p-3 space-y-1">
      <h3 class="font-semibold truncate">${c.name}</h3>
      <p class="text-xs">${c.status === 'working' ? '✅ Working' : c.status === 'broken' ? '❌ Broken' : '⏳ Untested'}</p>
      <div class="flex gap-2">
        <button class="flex-1 bg-blue-600 text-white py-1 rounded"
         onclick="event.stopPropagation();copyLink('${c.url.replace(/'/g, "\\'")}','${c.name}')">Copy</button>
        <button class="flex-1 bg-red-600 text-white py-1 rounded"
         onclick="event.stopPropagation();block('${c.url.replace(/'/g, "\\'")}')">Block</button>
      </div>
    </div>`;
                d.onclick = () => play(c);
                channels.appendChild(d);
            });
        }

        function play(c) {
            playerBox.classList.remove('hidden');
            statusEl.textContent = 'Loading...';
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(c.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); statusEl.textContent = 'Playing'; });
            hls.on(Hls.Events.ERROR, () => statusEl.textContent = 'Error');
        }

        function startAllTests() {
            testing = true;
            testIndex = 0;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            runTest();
        }

        function stopAllTests() {
            testing = false;
            if (hls) hls.destroy();
            clearTimeout(testTimer);
            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
        }

        function runTest() {
            if (!testing || testIndex >= allChannels.length) { stopAllTests(); return; }
            const c = allChannels[testIndex++];
            if (blocked.has(c.url)) { runTest(); return; }

            if (hls) hls.destroy();
            hls = new Hls();
            let confirmed = false;

            testTimer = setTimeout(() => {
                if (!confirmed) {
                    c.status = 'broken';
                    hls.destroy();
                    apply();
                    runTest();
                }
            }, TEST_TIMEOUT);

            hls.loadSource(c.url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                if (!confirmed) {
                    confirmed = true;
                    clearTimeout(testTimer);
                    c.status = 'working';
                    hls.destroy();
                    apply();
                    runTest();
                }
            });

            hls.on(Hls.Events.ERROR, () => {
                if (!confirmed) {
                    confirmed = true;
                    clearTimeout(testTimer);
                    c.status = 'broken';
                    hls.destroy();
                    apply();
                    runTest();
                }
            });
        }

        function block(u) { blocked.add(u); apply(); }
        function copyLink(u, n) { copied.set(u, n); renderCopied(); navigator.clipboard.writeText(u); }
        function renderCopied() {
            copiedList.innerHTML = '';
            copied.forEach((n, u) => {
                copiedList.innerHTML += `<li>${n}
    <button class="text-blue-600 ml-2" onclick="navigator.clipboard.writeText('${u}')">Copy</button></li>`;
            });
        }
        function copyAll() { navigator.clipboard.writeText([...copied.keys()].join('\n')); }

        startBtn.onclick = startAllTests;
        stopBtn.onclick = stopAllTests;

        document.querySelectorAll('.test-btn').forEach(b => b.onclick = () => {
            document.querySelectorAll('.test-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            testView = b.dataset.view;
            apply();
        });

        fileInput.onchange = e => { const r = new FileReader(); r.onload = x => process(x.target.result); r.readAsText(e.target.files[0]); };
        loadUrl.onclick = async () => { const r = await fetch(urlInput.value); process(await r.text()); };
        search.oninput = apply;
    </script>

</body>

</html>
